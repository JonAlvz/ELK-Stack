filter {
  if [type] == "logs" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:fecha} %{LOGLEVEL:nivel} %{WORD:archivo}\.%{WORD:extension}: %{NUMBER:linea} - %{GREEDYDATA:mensaje}"
      }
    }


    # Convertir la fecha al formato correcto
    date {
      match => [ "fecha", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
    }
  }
}